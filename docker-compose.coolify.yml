# Coolify deployment for Multica.
#
# Uses Coolify magic env vars:
#   SERVICE_FQDN_*      — Coolify generates a domain and sets the variable
#   SERVICE_PASSWORD_*  — Coolify generates a random password
#   SERVICE_BASE64_*    — Coolify generates a base64 secret
#
# In Coolify:
#   1. Create a new "Docker Compose" resource pointing at this file.
#   2. Set the domains for FQDN_FRONTEND / FQDN_BACKEND in the UI (or let
#      Coolify auto-assign them).
#   3. Set any optional vars (Google OAuth, Resend, S3) in the UI.

name: multica

services:
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_DB: multica
      POSTGRES_USER: multica
      POSTGRES_PASSWORD: ${SERVICE_PASSWORD_POSTGRES}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U multica -d multica"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SERVICE_FQDN_BACKEND_8080: /
      DATABASE_URL: postgres://multica:${SERVICE_PASSWORD_POSTGRES}@postgres:5432/multica?sslmode=disable
      PORT: "8080"
      JWT_SECRET: ${SERVICE_BASE64_64_JWT}
      FRONTEND_ORIGIN: ${SERVICE_URL_FRONTEND}
      CORS_ALLOWED_ORIGINS: ${SERVICE_URL_FRONTEND}
      MULTICA_APP_URL: ${SERVICE_URL_FRONTEND}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-noreply@multica.ai}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${SERVICE_URL_FRONTEND}/auth/callback
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-us-west-2}
      CLOUDFRONT_DOMAIN: ${CLOUDFRONT_DOMAIN:-}
      CLOUDFRONT_KEY_PAIR_ID: ${CLOUDFRONT_KEY_PAIR_ID:-}
      CLOUDFRONT_PRIVATE_KEY: ${CLOUDFRONT_PRIVATE_KEY:-}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        REMOTE_API_URL: http://backend:8080
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-}
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      SERVICE_FQDN_FRONTEND_3000: /
      HOSTNAME: "0.0.0.0"
      PORT: "3000"

volumes:
  pgdata:
